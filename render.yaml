services:
  - type: web
    name: socialscalebooster
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: socialscalebooster-db
          property: connectionString

databases:
  - name: socialscalebooster-db
    databaseName: socialscalebooster
    plan: free
